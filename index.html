<!DOCTYPE html>
<html lang="es">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IA UOCRA | Portal de Agentes</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

        <div class="container">
            <h1>Portal IA UOCRA</h1>
            <p>Directorio centralizado de agentes inteligentes de nuestra organización</p>

    </main>

        </div>

    <script src="app.js"></script>
